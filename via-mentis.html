<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Via Mentis – Psychosoziale Begleitung im Alltag</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Marcellus&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          sand: '#d6dac8',
          'sand-deep': '#c4c6b8',
          terracotta: '#c66f52',
          sage: '#8b9678',
          'sage-deep': '#6f745e',
          'sage-darker': '#565b46',
          'sage-bright': '#7c8268',
          'dusk-blue': '#6f745e',
          ink: '#2a2a2a',
          'ink-deep': '#1f1f1d',
          cream: '#f3f4ee',
          champagne: '#e3e6da',
        },
        fontFamily: {
          serif: ['"Marcellus"', 'Georgia', 'serif'],
          sans: ['Inter', 'sans-serif'],
          display: ['"Marcellus"', 'Georgia', 'serif'],
        },
        keyframes: {
          fadeUp: {
            '0%': { opacity: '0', transform: 'translateY(24px)' },
            '100%': { opacity: '1', transform: 'translateY(0)' },
          },
          fadeIn: {
            '0%': { opacity: '0' },
            '100%': { opacity: '1' },
          },
        },
        animation: {
          'fade-up': 'fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) both',
          'fade-up-delayed': 'fadeUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.3s forwards',
          'fade-in': 'fadeIn 1.5s ease 0.6s forwards',
        },
      },
    },
  };
</script>
<style type="text/tailwindcss">
  /* Noise-Textur als Overlay */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.06;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.4  0 0 0 0 0.3  0 0 0 0 0.2  0 0 0 0.08 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    z-index: 1;
  }
  /* Atmosphärischer Landschafts-Hero, weich in Champagner ausgeblendet */
  .hero-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(to bottom,
        rgba(227,230,218,0.92) 0%,
        rgba(227,230,218,0.62) 34%,
        rgba(227,230,218,0.54) 58%,
        rgba(227,230,218,0.84) 100%),
      url("images/bild2.jpeg");
    background-size: cover, cover;
    background-position: center top, center 62%;
    background-repeat: no-repeat;
    filter: saturate(1.15);
  }
  @layer components {
    .cta-link {
      @apply inline-flex items-center justify-center gap-2.5 w-[180px] font-sans text-[0.95rem] font-medium tracking-[0.18em] uppercase text-sage-deep no-underline px-6 py-[1.05rem] rounded-[10px] cursor-pointer transition-all duration-300 ease-[cubic-bezier(0.2,0.8,0.2,1)];
      background: transparent;
      border: 1px solid rgba(139, 150, 120, 0.7);
    }
    .cta-link:hover {
      @apply -translate-y-0.5;
      background: rgba(139, 150, 120, 0.1);
      border-color: rgba(139, 150, 120, 0.95);
    }
    .cta-link .arrow { @apply transition-transform duration-300; }
    .cta-link:hover .arrow { @apply translate-x-1; }

    .cta-link-secondary {
      @apply inline-flex items-center justify-center gap-2.5 w-[180px] font-sans text-[0.95rem] font-medium tracking-[0.18em] uppercase text-sage-deep no-underline px-6 py-[1.05rem] rounded-[10px] cursor-pointer transition-all duration-300 ease-[cubic-bezier(0.2,0.8,0.2,1)];
      background: transparent;
      border: 1px solid rgba(139, 150, 120, 0.7);
    }
    .cta-link-secondary:hover {
      @apply -translate-y-0.5;
      background: rgba(139, 150, 120, 0.1);
      border-color: rgba(139, 150, 120, 0.95);
    }

    @media (max-width: 600px) {
      .cta-link, .cta-link-secondary { @apply px-7 py-[0.95rem] text-[0.85rem]; }
    }

    .nav-btn {
      @apply font-sans flex items-center justify-center text-center text-[1.13rem] font-medium tracking-[0.16em] uppercase text-[#4d5142] no-underline px-4 py-3 rounded-[10px] transition-all duration-200;
      border: 1px solid rgba(83, 90, 72, 0.65);
    }
    .nav-btn:hover {
      @apply -translate-y-px text-ink-deep;
      background: rgba(139, 150, 120, 0.1);
      border-color: rgba(83, 90, 72, 1);
    }
    .nav-btn.active {
      @apply text-ink-deep;
      background: rgba(139, 150, 120, 0.18);
      border-color: rgba(83, 90, 72, 1);
    }
  }

  /* Terracotta-Linie, die sich um den Button-Rahmen biegt */
  @keyframes orbitDash {
    to { stroke-dashoffset: -100; }
  }
  .orbit-btn { position: relative; }
  .orbit-line {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
    pointer-events: none;
    z-index: 3;
  }
  .orbit-line rect {
    fill: none;
    stroke: #c66f52;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-dasharray: 8 92;
    stroke-dashoffset: 0;
    filter: drop-shadow(0 0 2px rgba(198, 111, 82, 0.5));
    animation: orbitDash 16s linear infinite;
  }
  .orbit-btn:disabled .orbit-line { display: none; }
  @media (prefers-reduced-motion: reduce) {
    .orbit-line { display: none; }
    .orbit-line rect { animation: none; }
  }
</style>
</head>
<body class="font-sans text-ink bg-champagne bg-fixed min-h-screen p-4 sm:p-8 relative overflow-x-hidden">
  <div class="hero-bg" aria-hidden="true"></div>
  <svg width="0" height="0" class="absolute" aria-hidden="true">
    <filter id="sharpen">
      <feConvolveMatrix order="3" preserveAlpha="true"
        kernelMatrix="0 -0.4 0  -0.4 2.6 -0.4  0 -0.4 0"/>
    </filter>
  </svg>

  <div class="relative z-10 flex flex-col justify-center min-h-[calc(100vh-2rem)] sm:min-h-[calc(100vh-4rem)] pb-6 sm:pb-8">
    <main class="w-full flex flex-col items-center justify-center gap-2 sm:gap-3 pt-2 sm:pt-3">
      <header class="text-center p-4 -mt-10 sm:-mt-14 animate-fade-up">
        <img
          src="images/logo-hd.png"
          alt="Via Mentis"
          class="block mx-auto mb-1.5 sm:mb-2 w-full max-w-[300px] sm:max-w-[390px] drop-shadow-[0_6px_16px_rgba(198,111,82,0.22)]"
        >
      </header>

      <section class="max-w-[620px] w-full px-4 text-center -mt-12 opacity-0 animate-fade-up-delayed">
        <h2 class="font-serif font-medium text-[clamp(2.3rem,4.6vw,3.22rem)] text-ink-deep leading-[1.2] mb-5 tracking-[0.02em] [text-wrap:balance]">
          Unterstützung, wenn das Leben herausfordernd wird.
        </h2>
        <p class="font-serif font-normal text-[1.44rem] text-ink max-w-[500px] mx-auto leading-[1.6]">
          Psychosoziale Begleitung im Alltag
        </p>
      </section>
    </main>

    <footer class="w-full max-w-[720px] mx-auto px-4 mt-[1.82rem]">
      <nav class="grid grid-cols-2 sm:grid-cols-4 gap-2.5 pt-[1.59rem] border-t border-[rgba(139,150,120,0.3)]">
        <a href="angebot.html" class="nav-btn orbit-btn"><svg class="orbit-line" aria-hidden="true" focusable="false"><rect x="0" y="0" width="100%" height="100%" rx="10" ry="10" pathLength="100"/></svg>Angebot</a>
        <a href="ueber-uns.html" class="nav-btn orbit-btn"><svg class="orbit-line" aria-hidden="true" focusable="false"><rect x="0" y="0" width="100%" height="100%" rx="10" ry="10" pathLength="100"/></svg>Über mich</a>
        <a href="gebiet.html" class="nav-btn orbit-btn"><svg class="orbit-line" aria-hidden="true" focusable="false"><rect x="0" y="0" width="100%" height="100%" rx="10" ry="10" pathLength="100"/></svg>Gebiet</a>
        <a href="kontakt.html" class="nav-btn orbit-btn"><svg class="orbit-line" aria-hidden="true" focusable="false"><rect x="0" y="0" width="100%" height="100%" rx="10" ry="10" pathLength="100"/></svg>Kontakt</a>
      </nav>
    </footer>
  </div>
</body>
</html>
