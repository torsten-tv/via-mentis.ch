<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einzugsgebiet – Via Mentis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Marcellus&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          sand: '#d6dac8',
          'sand-deep': '#c4c6b8',
          terracotta: '#c66f52',
          sage: '#8b9678',
          'sage-deep': '#6f745e',
          'sage-darker': '#565b46',
          'sage-bright': '#7c8268',
          'dusk-blue': '#6f745e',
          ink: '#2a2a2a',
          'ink-deep': '#1f1f1d',
          cream: '#f3f4ee',
          champagne: '#e3e6da',
        },
        fontFamily: {
          serif: ['"Marcellus"', 'Georgia', 'serif'],
          sans: ['Inter', 'sans-serif'],
          display: ['"Marcellus"', 'Georgia', 'serif'],
        },
        keyframes: {
          fadeUp: {
            '0%': { opacity: '0', transform: 'translateY(24px)' },
            '100%': { opacity: '1', transform: 'translateY(0)' },
          },
        },
        animation: {
          'fade-up': 'fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) both',
          'fade-up-delayed': 'fadeUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.3s forwards',
        },
      },
    },
  };
</script>
<style type="text/tailwindcss">
  /* Noise-Textur als Overlay */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.06;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.4  0 0 0 0 0.3  0 0 0 0 0.2  0 0 0 0.08 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    z-index: 1;
  }
  @layer components {
    .area-block {
      @apply pl-6 border-l-[3px] border-sage-darker mb-8;
    }
    .area-block h2 {
      @apply font-serif font-medium text-[clamp(1.4rem,2.6vw,1.85rem)] text-ink-deep leading-[1.2] mb-3;
    }
    .area-block p {
      @apply font-serif font-normal text-[clamp(1.05rem,1.4vw,1.18rem)] text-ink leading-[1.55] mb-0;
    }

    .place-list { @apply flex flex-wrap gap-2.5 mt-1; }
    .place-list span {
      @apply font-sans text-[0.9rem] tracking-[0.04em] text-ink-deep px-3.5 py-1.5 rounded-full;
      background: rgba(139, 150, 120, 0.14);
      border: 1px solid rgba(139, 150, 120, 0.35);
    }

    .region-box {
      @apply rounded-[16px] px-7 py-6 border-l-[3px] border-sage-darker;
      background: #d6dac8;
    }

    .nav-btn {
      @apply font-sans flex items-center justify-center text-center text-[1.13rem] font-medium tracking-[0.16em] uppercase text-[#4d5142] no-underline px-4 py-3 rounded-[10px] transition-all duration-200;
      border: 1px solid rgba(83, 90, 72, 0.65);
    }
    .nav-btn:hover {
      @apply -translate-y-px text-ink-deep;
      background: rgba(139, 150, 120, 0.1);
      border-color: rgba(83, 90, 72, 1);
    }
    .nav-btn.active {
      @apply text-ink-deep;
      background: rgba(139, 150, 120, 0.18);
      border-color: rgba(83, 90, 72, 1);
    }
  }

  /* Terracotta-Linie, die sich um den Button-Rahmen biegt */
  @keyframes orbitDash {
    to { stroke-dashoffset: -100; }
  }
  .orbit-btn { position: relative; }
  .orbit-line {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
    pointer-events: none;
    z-index: 3;
  }
  .orbit-line rect {
    fill: none;
    stroke: #c66f52;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-dasharray: 8 92;
    stroke-dashoffset: 0;
    filter: drop-shadow(0 0 2px rgba(198, 111, 82, 0.5));
    animation: orbitDash 16s linear infinite;
  }
  @media (prefers-reduced-motion: reduce) {
    .orbit-line { display: none; }
    .orbit-line rect { animation: none; }
  }
</style>
</head>
<body class="font-sans text-ink bg-champagne bg-fixed min-h-screen p-4 sm:p-8 relative overflow-x-hidden">
  <div class="relative z-10 flex flex-col min-h-[calc(100vh-2rem)] sm:min-h-[calc(100vh-4rem)] pb-6 sm:pb-8">
    <main class="flex-1 w-full flex flex-col items-center gap-3 sm:gap-5 pt-2 sm:pt-3">
    <header class="text-center p-4 -mt-[20px] animate-fade-up">
      <a href="via-mentis.html" aria-label="Zur Startseite">
        <img
          src="images/logo-final.png"
          alt="Via Mentis"
          class="block mx-auto w-full max-w-[104px] sm:max-w-[127px] drop-shadow-[0_6px_16px_rgba(198,111,82,0.22)]"
        >
      </a>
    </header>

    <section class="max-w-[640px] w-full px-4 opacity-0 animate-fade-up-delayed">

      <div class="text-center mb-7">
        <h1 class="font-serif font-medium text-[clamp(2.4rem,4.6vw,3.1rem)] text-ink leading-[1.15]">Einzugsgebiet</h1>
      </div>

      <figure class="mb-9 w-[138%] max-w-none -mx-[19%]">
        <img src="images/einzugsgebiet-bern-20km.svg"
             alt="Stilisierte Karte des Einzugsgebiets: Bern mit der Aare zwischen Thuner- und Bielersee sowie den umliegenden Orten Zollikofen, Burgdorf, Worb, Köniz, Belp und Münsingen"
             class="w-full h-auto block">
      </figure>

      <div class="area-block">
        <h2>Termine vor Ort</h2>
        <p>
          Die Begleitung findet bei Ihnen zu Hause, an einem Ort Ihrer Wahl oder
          nach Absprache statt. Liegt Ihr Wohnort ausserhalb des Gebiets? Sprechen Sie mich
          gerne an – wir finden eine Lösung.
        </p>
      </div>

    </section>
    </main>

    <footer class="w-full max-w-[720px] mx-auto px-4 mt-10">
      <nav class="grid grid-cols-2 sm:grid-cols-4 gap-2.5 pt-7 border-t border-[rgba(139,150,120,0.3)]">
        <a href="via-mentis.html" class="nav-btn orbit-btn"><svg class="orbit-line" aria-hidden="true" focusable="false"><rect x="0" y="0" width="100%" height="100%" rx="10" ry="10" pathLength="100"/></svg>Start</a>
        <a href="angebot.html" class="nav-btn orbit-btn"><svg class="orbit-line" aria-hidden="true" focusable="false"><rect x="0" y="0" width="100%" height="100%" rx="10" ry="10" pathLength="100"/></svg>Angebot</a>
        <a href="ueber-uns.html" class="nav-btn orbit-btn"><svg class="orbit-line" aria-hidden="true" focusable="false"><rect x="0" y="0" width="100%" height="100%" rx="10" ry="10" pathLength="100"/></svg>Über mich</a>
        <a href="kontakt.html" class="nav-btn orbit-btn"><svg class="orbit-line" aria-hidden="true" focusable="false"><rect x="0" y="0" width="100%" height="100%" rx="10" ry="10" pathLength="100"/></svg>Kontakt</a>
      </nav>
    </footer>
  </div>
</body>
</html>
